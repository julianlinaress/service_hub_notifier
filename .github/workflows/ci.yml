name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  unit:
    name: Unit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

      - name: Check gofmt
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "The following files are not gofmt-formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: Go vet
        run: go vet ./...

      - name: Go test
        run: go test ./... -race -cover

  build-container:
    name: Build Container
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: service-hub-notifier:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run container and check health
        run: |
          docker run -d --name notifier-ci -p 18081:8081 \
            -e INTERNAL_SERVICE_TOKEN=ci-internal-token \
            service-hub-notifier:ci
          trap 'docker logs notifier-ci || true; docker rm -f notifier-ci || true' EXIT

          for i in $(seq 1 20); do
            if curl -fsS "http://127.0.0.1:18081/health" >/dev/null; then
              break
            fi
            sleep 1
          done

          curl -fsS "http://127.0.0.1:18081/health"

  integration:
    name: Integration
    runs-on: ubuntu-latest
    needs: build-container
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run compose integration tests
        run: docker compose -f docker-compose.test.yml up --build --abort-on-container-exit --exit-code-from phoenix_mock
